services:
  db:
    image: postgres:16-alpine
    container_name: aura_backend_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hookahmix
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hookahmix"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aura_backend_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:pass@db:5432/hookahmix
      SECRET_KEY: change_me_in_production
    ports:
      - "8000:8000"

volumes:
  postgres_data:
