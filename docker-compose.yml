services:
  db:
    image: postgres:16
    container_name: hooka_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hookahmix
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: vQFwbliAT9PziFf3nJE_nTQOmwx1MfSowAB-E7F6k5ODN4nhWNuivLOUnhowvPiG 
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hookahmix"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    container_name: hooka_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:vQFwbliAT9PziFf3nJE_nTQOmwx1MfSowAB-E7F6k5ODN4nhWNuivLOUnhowvPiG@db:5432/hookahmix
      SECRET_KEY: vQFwbliAT9PziFf3nJE_nTQOmwx1MfSowAB-E7F6k5ODN4nhWNuivLOUnhowvPiG
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"

volumes:
  pgdata:
